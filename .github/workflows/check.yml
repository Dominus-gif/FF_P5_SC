name: Stock Check

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes (GitHub may delay by a few min)
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

permissions:
  contents: write             # needed to commit state.json back

concurrency:
  group: stock-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checker
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: python checker.py

      - name: Save state
        run: |
          git config user.name "stock-bot"
          git config user.email "actions@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || (git commit -m "update state [skip ci]" && git push)
